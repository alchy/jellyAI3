# jelly.ithosaudio.eu — jellyAI3 (viewBase web). Proxy na uvicorn 127.0.0.1:8080 + WebSocket.
map $http_upgrade $jelly_conn_upgrade { default upgrade; '' close; }

server {
    server_name jelly.ithosaudio.eu;

    access_log /var/log/nginx/jelly/access.log main;
    error_log  /var/log/nginx/jelly/error.log warn;

    add_header X-Frame-Options              "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options       "nosniff"                                      always;
    add_header Referrer-Policy              "strict-origin"                                always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains"          always;
    # viewBase = Three.js/WebGL + troika SDF text (blob web-worker) → povol worker blob:
    # a unsafe-eval (troika generuje worker kód); WS na stejný origin kryje connect-src 'self'.
    # connect-src povoluje cdn.jsdelivr.net: troika-three-text (SDF popisky uzlů)
    # tahá přes fetch() glyfy z unicode-font-resolver na jsDelivr; bez toho jsou
    # titulky uzlů neviditelné (text bez fontu). WebSocket kryje 'self'.
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data: https://cdn.jsdelivr.net; connect-src 'self' https://cdn.jsdelivr.net; media-src 'self' blob: data:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # Basic auth — uživatel ithosaudio
    auth_basic           "ithosaudio";
    auth_basic_user_file /etc/nginx/conf.d/.htpasswd.jelly;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $jelly_conn_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/jelly.ithosaudio.eu/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/jelly.ithosaudio.eu/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = jelly.ithosaudio.eu) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name jelly.ithosaudio.eu;

    listen 80;
    listen [::]:80;

    # ACME challenge (webroot) — obnova certu bez výpadku
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    return 404;
}
